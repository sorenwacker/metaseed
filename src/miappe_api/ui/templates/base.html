<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIAPPE-API</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body hx-headers='{"X-Requested-With": "XMLHttpRequest"}'>
    <div class="layout">
        <header class="header">
            <h1 class="header-title">MIAPPE-API</h1>
            <div class="header-controls">
                <label for="profile-select">Profile:</label>
                <select id="profile-select"
                        name="profile"
                        hx-post="/profile/{value}"
                        hx-trigger="change"
                        hx-swap="none">
                    {% for p in profiles %}
                    <option value="{{ p }}" {% if p == current_profile %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
        </header>

        <aside class="sidebar" id="sidebar"
               hx-get="/sidebar"
               hx-trigger="entityCreated from:body, entityUpdated from:body"
               hx-swap="innerHTML">
            {% include "partials/sidebar.html" %}
        </aside>

        <main class="main" id="main">
            {% block content %}
            {% include "index.html" %}
            {% endblock %}
        </main>
    </div>

    <div id="notification-container" class="notification-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
