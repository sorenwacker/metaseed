    - name: latitude
      type: float
      required: false
      description: The geographical origin of the sample as defined by latitude.
    - name: longitude
      type: float
      required: false
      description: The geographical origin of the sample as defined by longitude.
    - name: altitude
      type: string
      required: false
      description: Altitude of the sample origin location, provided in metres (m). Can be found at https://en-gb.topographic-map.com/
    - name: age
      type: float
      required: false
      description: Age of the plant from the start of germination in days. Age of subject at the time of sample collection
    - name: genotype
      type: string
      required: false
      description: Name or code for genotype of plant in a genebank
    - name: genebank
      type: string
      required: false
      description: Name of the genebank
    - name: ecotype
      type: string
      required: false
      description: A population within a given species displaying genetically based, phenotypic traits that reflect adaptation
        to a local habitat.
    - name: cultivar
      type: string
      required: false
      description: Cultivar (cultivated variety) of plant from which sample was obtained
    - name: sex
      type: string
      required: false
      description: Sex of the plant under study
    - name: seed_batch_id
      type: list
      required: false
      description: ID of the seed batch often used for crop plants, where genotyping is not feasible for research purposes;
        one genotype might have multiple seed batch IDs
      items: string
    - name: growth_conditions
      type: string
      required: false
      description: Description of growth conditions before the treatment
    - name: growth_facility
      type: list
      required: false
      description: Type of facility where the sampled plant was grown.
      items: string
    - name: growth_medium
      type: string
      required: false
      description: Substrate on which the plants are grown, before the treatment
      constraints:
        enum:
        - soil
        - aeroponic
        - hydroponic
        - in vitro solid culture medium
        - in vitro liquid culture medium
    - name: growth_light_regimen
      type: list
      required: false
      description: Information about treatment involving an exposure to light, this includes both light intensity and quality.
        Photoperiod day/night in hours, before the treatment
      items: string
    - name: growth_temperature_day
      type: float
      required: false
      description: Growth temperature during the light phase, before the treatment; in degrees Celsius
    - name: growth_temperature_night
      type: float
      required: false
      description: Growth temperature during the dark phase, before the treatment; in degrees Celsius
    - name: growth_light_intensity
      type: float
      required: false
      description: Approximate light intensity, before the treatment; in micromol/sec/m2
    - name: growth_light_rfr_ratio
      type: float
      required: false
      description: Ratio of red and far red irradiation in the light spectrum, before the treatment
    - name: treatment
      type: list
      required: false
      description: Short description of treatment
      items: string
    - name: treatment_ontology
      type: list
      required: false
      description: Ontology term for treatment as deposited on Planteome
      items: string
    - name: treatment_growth_medium
      type: list
      required: false
      description: Substrate on which the plants are grown during the treatment
      items: string
    - name: treatment_light_regimen
      type: list
      required: false
      description: Photoperiod day/night in hours during the treatment (day_night)
      items: string
    - name: treatment_temperature_day
      type: float
      required: false
      description: Growth temperature during the light phase during the treatment; in degrees Celsius
    - name: treatment_temperature_night
      type: float
      required: false
      description: Growth temperature during the dark phase during the treatment; in degrees Celsius
    - name: treatment_light_intensity
      type: float
      required: false
      description: Approximate light intensity, duirng the treatment; in micromol/sec/m2
    - name: treatment_light_rfr_ratio
      type: float
      required: false
      description: Ratio of red and far red irradiation in the light spectrum during the treatment
    - name: treatment_time_duration
      type: list
      required: false
      description: Time of treatment (use "minute", "hour", "day" as singular, not plural)
      items: string
    - name: treatment_time_of_day
      type: list
      required: false
      description: Time of treatment of day. Use either Zeitgeber time or local time.
      items: string
    - name: treatment_chemical
      type: list
      required: false
      description: Description of the chemical treatment
      items: string
    - name: treatment_chemical_cas_id
      type: list
      required: false
      description: CAS ID for the chemical
      items: string
    - name: experimental_group
      type: string
      required: false
      description: Short description of the sample type in the experimental design (control, treatment, mock)
      constraints:
        enum:
        - control
        - treatment
        - mock
    - name: biochemical_extraction_date
      type: date
      required: false
      description: Date of the extraction of molecules for sequencing
    - name: sequencing_submission_date
      type: date
      required: false
      description: Date of submission for sequencing
    - name: replacement_sample
      type: string
      required: false
      description: In case the sample name is incorrect, provide the correct sample ID here (Global CropXR Sample ID)
    - name: remarks
      type: string
      required: false
      description: Other notes about the sample
  ObservedVariable:
    description: A variable consists of a trait, a method to measure the trait and a scale expressing the measurement.
    fields:
    - name: study_id
      type: string
      required: false
      description: Unique identifier comprising the name or identifier for the institution/database hosting the submission
        of the study data, and the identifier of the study in that institution.
    - name: variable_id
      type: string
      required: false
      description: 'Code used to identify the variable in the data file. We recommend using a variable definition from the
        Crop Ontology where possible. Otherwise, the Crop Ontology naming convention is recommended: <trait abbreviation>_<method
        abbreviation>_<scale abbreviation>). A variable ID must be unique within a given investigation.'
    - name: variable_name
      type: string
      required: false
      description: Name of the variable.
    - name: variable_accession_number
      type: string
      required: false
      description: Accession number of the variable in the Crop Ontology
    - name: trait
      type: string
      required: false
      description: Name of the (plant or environmental) trait under observation
    - name: trait_accession_number
      type: string
      required: false
      description: Accession number of the trait in a suitable controlled vocabulary (Crop Ontology, Trait Ontology).
    - name: method
      type: string
      required: false
      description: Name of the method of observation
    - name: method_accession_number
      type: string
      required: false
      description: Accession number of the method in a suitable controlled vocabulary (Crop Ontology, Trait Ontology).
    - name: method_description
      type: string
      required: false
      description: Textual description of the method, which may extend a method defined in an external reference with specific
        parameters, e.g. growth stage, inoculation precise organ (leaf number)
    - name: reference_method
      type: uri
      required: false
      description: URI/DOI of reference describing the method.
    - name: scale
      type: string
      required: false
      description: Name of the scale associated with the variable
    - name: scale_accession_number
      type: string
      required: false
      description: Accession number of the scale in a suitable controlled vocabulary (Crop Ontology).
    - name: time_scale
      type: string
      required: false
      description: Name of the scale or unit of time with which observations of this type were recorded in the data file (for
        time series studies).
  Experiment:
    description: An 'experiment' object serves as a metadata record encapsulating essential details about a sequencing assay
      ('experiment' in ENA terms), sequencing type, and relevant parameters. This information enhances the interpretation
      and contextual understanding of nucleotide sequences submitted to the archive.
    fields:
    - name: internal_experiment_id
      type: string
      required: false
      description: Unique identifier for each experiment. This is used to link runs to experiments. This can be the same as
        the sample id if only a single assay is performed per sample. At multiple assays, use this id to submit for assay.
    - name: study_id
      type: string
      required: false
      description: Identifies the parent study.
    - name: lab_internal_sample_id
      type: integer
      required: false
      description: Internal sample ID, to link the experiment to the sample. This is the name under which the sample is submitted
        for sequencing.
    - name: phenotyping_lab_internal_sample_id
      type: string
      required: false
      description: Internal sample ID from phenotyping experiment, if the sample was both phenotyped and sequenced.
    - name: design_description
      type: string
      required: false
      description: Goal and setup of the individual library including library was constructed.
    - name: library_strategy
      type: string
      required: false
      description: Sequencing technique intended for this library.
      constraints:
        enum:
        - WGS
        - WGA
        - WXS
        - RNA-Seq
        - ssRNA-seq
        - snRNA-seq
        - miRNA-Seq
        - ncRNA-Seq
        - FL-cDNA
        - EST
        - Hi-C
        - ATAC-seq
        - WCS
        - RAD-Seq
        - CLONE
        - POOLCLONE
        - AMPLICON
        - CLONEEND
        - FINISHING
        - ChIP-Seq
        - MNase-Seq
        - DNase-Hypersensitivity
        - Bisulfite-Seq
        - CTS
        - MRE-Seq
        - MeDIP-Seq
        - MBD-Seq
        - Tn-Seq
        - VALIDATION
        - FAIRE-seq
        - SELEX
        - RIP-Seq
        - ChIA-PET
        - Synthetic-Long-Read
        - Targeted-Capture
        - Tethered Chromatin Conformation Capture
        - NOMe-Seq
        - ChM-Seq
        - GBS
        - Ribo-Seq
        - OTHER
    - name: library_source
      type: string
      required: false
      description: The library_source specifies the type of source material that is being sequenced
      constraints:
        enum:
        - GENOMIC
        - GENOMIC SINGLE CELL
        - TRANSCRIPTOMIC
        - TRANSCRIPTOMIC SINGLE CELL
        - METAGENOMIC
        - METATRANSCRIPTOMIC
        - SYNTHETIC
        - VIRAL RNA
        - OTHER
    - name: library_selection
      type: string
      required: false
      description: Method used to enrich the target in the sequence library preparation
      constraints:
        enum:
        - RANDOM
        - PCR
        - RANDOM PCR
        - RT-PCR
        - HMPR
        - MF
        - repeat fractionation
        - size fractionation
        - MSLL
        - cDNA
        - cDNA_randomPriming
        - cDNA_oligo_dT
        - PolyA
        - Oligo-dT
        - Inverse rRNA
        - Inverse rRNA selection
        - ChIP
        - ChIP-Seq
        - MNase
        - DNase
        - Hybrid Selection
        - Reduced Representation
        - Restriction Digest
        - 5-methylcytidine antibody
        - MBD2 protein methyl-CpG binding domain
        - CAGE
        - RACE
        - MDA
        - padlock probes capture method
        - other
        - unspecified
    - name: library_layout
      type: string
      required: false
      description: Library_layout specifies whether to expect single, paired, or other configuration of reads. in the case
        of paired reads, information about the relative distance and orientation is specified.
      constraints:
        enum:
        - paired-end unstranded
        - paired-end firststrand
        - paired-end secondstrand
        - single-end unstranded
        - single-end firststrand
        - single-end secondstrand
    - name: insert_size
      type: string
      required: false
      description: Insert size for paired reads
    - name: library_construction_protocol
      type: string
      required: false
      description: Free form text describing the protocol by which the sequencing library was constructed.
    - name: platform
      type: string
      required: false
      description: The platform record selects which sequencing platform and platform-specific runtime parameters. this will
        be determined by the center. optional if 'instrument_model' is provided.
      constraints:
        enum:
        - LS454
        - ILLUMINA
        - HELICOS
