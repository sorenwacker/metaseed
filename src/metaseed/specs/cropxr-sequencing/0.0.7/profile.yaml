name: cropxr-sequencing
display_name: CropXR Sequencing
version: 0.0.7
description: CropXR Sequencing metadata schema for CropXR consortium.
root_entity: Study
entities:
  Study:
    description: A study comprises a series of assays (or measurements) of one or more types, undertaken to answer a particular
      biological question.
    fields:
    - name: study_id
      type: string
      required: false
      description: Unique identifier for a study. This is used to link studies to an investigation. Provided after registration.
        Also called study label.
    - name: internal_study_id
      type: string
      required: true
      description: Internal study id for own annotation.
    - name: study_title
      type: string
      required: true
      description: Human-readable text summarising the study
    - name: study_description
      type: string
      required: true
      description: Briefly describes the goals, purpose, and scope of the study. this need not be listed if it can be inherited
        from a referenced publication.
    - name: study_start_date
      type: date
      required: true
      description: Date that the study is registered at CropXR.
    - name: study_end_date
      type: date
      required: false
      description: Date that the study is registered at CropXR as completed.
    - name: country
      type: string
      required: true
      description: The country where the experiment took place, either as a full name or preferably as a 3-letter code.
