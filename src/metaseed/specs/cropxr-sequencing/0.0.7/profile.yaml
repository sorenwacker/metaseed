    - name: investigation_id
      type: string
      required: true
      description: Identifies the parent investigation.
    - name: ena_study_id
      type: string
      required: false
      description: ENA study ID obtained during the data submission to ENA; not to be filled at the start
    - name: study_type
      type: string
      required: true
      description: The study_type presents a controlled vocabulary for expressing the overall purpose of the study.
      constraints:
        enum:
        - Whole Genome Sequencing
        - Metagenomics
        - Transcriptome Analysis
        - Resequencing
        - Epigenetics
        - Synthetic Genomics
        - Forensic or Paleo-genomics
        - Gene Regulation Study
        - Cancer Genomics
        - Population Genomics
        - RNASeq
        - Exome Sequencing
        - Pooled Clone Sequencing
        - Transcriptome Sequencing
        - Other
    - name: experiments
      type: list
      items: Experiment
      required: false
      description: Experiments in this study
    - name: samples
      type: list
      items: Sample
      required: false
      description: Samples in this study
    - name: persons
      type: list
      items: Person
      required: false
      description: Persons associated with this study
  Experiment:
    description: An 'experiment' object serves as a metadata record encapsulating essential details about a sequencing assay
      ('experiment' in ENA terms), sequencing type, and relevant parameters. This information enhances the interpretation
      and contextual understanding of nucleotide sequences submitted to the archive.
    fields:
    - name: internal_experiment_id
      type: string
      required: false
      description: Unique identifier for each experiment. This is used to link runs to experiments. This can be the same as
        the sample id if only a single assay is performed per sample. At multiple assays, use this id to submit for assay.
    - name: study_id
      type: string
      required: true
      description: Identifies the parent study.
    - name: lab_internal_sample_id
      type: integer
      required: false
      description: Internal sample ID, to link the experiment to the sample. This is the name under which the sample is submitted
        for sequencing.
    - name: phenotyping_lab_internal_sample_id
      type: string
      required: false
      description: Internal sample ID from phenotyping experiment, if the sample was both phenotyped and sequenced.
    - name: design_description
      type: string
      required: false
      description: Goal and setup of the individual library including library was constructed.
    - name: library_strategy
      type: string
      required: false
      description: Sequencing technique intended for this library.
      constraints:
        enum:
        - WGS
        - WGA
        - WXS
        - RNA-Seq
        - ssRNA-seq
        - snRNA-seq
        - miRNA-Seq
        - ncRNA-Seq
        - FL-cDNA
        - EST
        - Hi-C
        - ATAC-seq
        - WCS
        - RAD-Seq
        - CLONE
        - POOLCLONE
        - AMPLICON
        - CLONEEND
        - FINISHING
        - ChIP-Seq
        - MNase-Seq
        - DNase-Hypersensitivity
        - Bisulfite-Seq
        - CTS
        - MRE-Seq
        - MeDIP-Seq
        - MBD-Seq
        - Tn-Seq
        - VALIDATION
        - FAIRE-seq
        - SELEX
        - RIP-Seq
        - ChIA-PET
        - Synthetic-Long-Read
        - Targeted-Capture
        - Tethered Chromatin Conformation Capture
        - NOMe-Seq
        - ChM-Seq
        - GBS
        - Ribo-Seq
        - OTHER
    - name: library_source
      type: string
      required: false
      description: The library_source specifies the type of source material that is being sequenced
      constraints:
        enum:
        - GENOMIC
        - GENOMIC SINGLE CELL
        - TRANSCRIPTOMIC
        - TRANSCRIPTOMIC SINGLE CELL
        - METAGENOMIC
        - METATRANSCRIPTOMIC
        - SYNTHETIC
        - VIRAL RNA
        - OTHER
    - name: library_selection
      type: string
      required: false
      description: Method used to enrich the target in the sequence library preparation
      constraints:
        enum:
        - RANDOM
        - PCR
        - RANDOM PCR
        - RT-PCR
        - HMPR
        - MF
        - repeat fractionation
        - size fractionation
        - MSLL
        - cDNA
        - cDNA_randomPriming
        - cDNA_oligo_dT
        - PolyA
        - Oligo-dT
        - Inverse rRNA
        - Inverse rRNA selection
        - ChIP
        - ChIP-Seq
        - MNase
        - DNase
        - Hybrid Selection
        - Reduced Representation
        - Restriction Digest
        - 5-methylcytidine antibody
        - MBD2 protein methyl-CpG binding domain
        - CAGE
        - RACE
        - MDA
        - padlock probes capture method
        - other
        - unspecified
    - name: library_layout
      type: string
      required: false
      description: Library_layout specifies whether to expect single, paired, or other configuration of reads. in the case
        of paired reads, information about the relative distance and orientation is specified.
      constraints:
        enum:
        - paired-end unstranded
        - paired-end firststrand
        - paired-end secondstrand
        - single-end unstranded
        - single-end firststrand
        - single-end secondstrand
    - name: insert_size
      type: string
      required: false
      description: Insert size for paired reads
    - name: library_construction_protocol
      type: string
      required: false
      description: Free form text describing the protocol by which the sequencing library was constructed.
    - name: platform
      type: string
      required: false
      description: The platform record selects which sequencing platform and platform-specific runtime parameters. this will
        be determined by the center. optional if 'instrument_model' is provided.
      constraints:
        enum:
        - LS454
        - ILLUMINA
        - HELICOS
        - ABI_SOLID
        - COMPLETE_GENOMICS
        - BGISEQ
        - OXFORD_NANOPORE
        - PACBIO_SMRT
        - ION_TORRENT
        - CAPILLARY
        - DNBSEQ
        - ELEMENT
        - ULTIMA
        - VELA_DIAGNOSTICS
        - GENAPSYS
        - GENEMIND
        - TAPESTRI
    - name: instrument_model
      type: string
      required: false
      description: Model of the sequencing instrument.
      constraints:
