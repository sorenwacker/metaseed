    - name: latitude
      type: float
      required: true
      description: The geographical origin of the sample as defined by latitude.
    - name: longitude
      type: float
      required: true
      description: The geographical origin of the sample as defined by longitude.
    - name: altitude
      type: string
      required: false
      description: Altitude of the sample origin location, provided in metres (m). Can be found at https://en-gb.topographic-map.com/
    - name: age
      type: float
      required: true
      description: Age of the plant from the start of germination in days. Age of subject at the time of sample collection
    - name: genotype
      type: string
      required: true
      description: Name or code for genotype of plant in a genebank
    - name: genebank
      type: string
      required: true
      description: Name of the genebank
    - name: ecotype
      type: string
      required: true
      description: A population within a given species displaying genetically based, phenotypic traits that reflect adaptation
        to a local habitat.
    - name: cultivar
      type: string
      required: true
      description: Cultivar (cultivated variety) of plant from which sample was obtained
    - name: sex
      type: string
      required: true
      description: Sex of the plant under study
    - name: seed_batch_id
      type: list
      required: true
      description: ID of the seed batch often used for crop plants, where genotyping is not feasible for research purposes;
        one genotype might have multiple seed batch IDs
      items: string
    - name: growth_conditions
      type: string
      required: true
      description: Description of growth conditions before the treatment
    - name: growth_facility
      type: list
      required: true
      description: Type of facility where the sampled plant was grown.
      items: string
    - name: growth_medium
      type: string
      required: true
      description: Substrate on which the plants are grown, before the treatment
      constraints:
        enum:
        - soil
        - aeroponic
        - hydroponic
        - in vitro solid culture medium
        - in vitro liquid culture medium
    - name: growth_light_regimen
      type: list
      required: true
      description: Information about treatment involving an exposure to light, this includes both light intensity and quality.
        Photoperiod day/night in hours, before the treatment
      items: string
    - name: growth_temperature_day
      type: list
      required: true
      description: Growth temperature during the light phase, before the treatment; in degrees Celsius
      items: string
    - name: growth_temperature_night
      type: list
      required: true
      description: Growth temperature during the dark phase, before the treatment; in degrees Celsius
      items: string
    - name: growth_light_intensity
      type: list
      required: true
      description: Approximate light intensity, before the treatment; in micromol/sec/m2
      items: string
    - name: growth_light_rfr_ratio
      type: list
      required: true
      description: Ratio of red and far red irradiation in the light spectrum, before the treatment
      items: string
    - name: treatment
      type: list
      required: true
      description: Short description of treatment
      items: string
    - name: treatment_ontology
      type: list
      required: true
      description: Ontology term for treatment as deposited on Planteome
      items: string
    - name: treatment_growth_medium
      type: list
      required: true
      description: Substrate on which the plants are grown during the treatment
      items: string
    - name: treatment_light_regimen
      type: list
      required: true
      description: Photoperiod day/night in hours during the treatment (day_night)
      items: string
    - name: treatment_temperature_day
      type: list
      required: true
      description: Growth temperature during the light phase during the treatment; in degrees Celsius
      items: string
    - name: treatment_temperature_night
      type: list
      required: true
      description: Growth temperature during the dark phase during the treatment; in degrees Celsius
      items: string
    - name: treatment_light_intensity
      type: list
      required: true
      description: Approximate light intensity, duirng the treatment; in micromol/sec/m2
      items: string
    - name: treatment_light_rfr_ratio
      type: list
      required: true
      description: Ratio of red and far red irradiation in the light spectrum during the treatment
      items: string
    - name: treatment_time_duration
      type: list
      required: true
      description: Time of treatment (use "minute", "hour", "day" as singular, not plural)
      items: string
    - name: treatment_time_of_day
      type: list
      required: true
      description: Time of treatment of day. Use either Zeitgeber time or local time.
      items: string
    - name: treatment_chemical
      type: list
      required: true
      description: Description of the chemical treatment
      items: string
    - name: treatment_chemical_cas_id
      type: list
      required: true
      description: CAS ID for the chemical
      items: string
    - name: experimental_group
      type: string
      required: true
      description: Short description of the sample type in the experimental design (control, treatment, mock)
      constraints:
        enum:
        - control
        - treatment
        - mock
    - name: biochemical_extraction_date
      type: date
      required: true
      description: Date of the extraction of molecules for sequencing
    - name: sequencing_submission_date
      type: date
      required: true
      description: Date of submission for sequencing
    - name: replacement_sample
      type: string
      required: false
      description: In case the sample name is incorrect, provide the correct sample ID here (Global CropXR Sample ID)
    - name: remarks
      type: string
      required: false
      description: Other notes about the sample
  Investigation:
    description: Investigations are research programmes with defined aims. It is a collection of studies.
    fields:
    - name: investigation_id
      type: string
      required: false
      description: Identifier comprising the unique name of the institution/database hosting the submission of the investigation
        data, and the accession number of the investigation in that institution. Provided after registration. Also called
        investigation label.
    - name: investigation_title
      type: string
      required: false
      description: Human-readable string summarising the investigation.
    - name: investigation_description
      type: string
      required: false
      description: Human-readable text describing the investigation in more detail
    - name: studies
      type: list
      items: Study
      required: false
      description: Studies in this investigation
  Person:
    description: A human involved in the investigation or specifically any of its studies.
    fields:
    - name: person_name
      type: string
      required: true
      description: The name of the person (the first name followed by the last name, either full name, or as used in scientific
        publications)
    - name: person_email
      type: string
      required: false
      description: The electronic mail address of the person.
    - name: person_id
      type: string
      required: false
      description: An identifier for the data submitter. If that submitter is an individual, ORCID identifiers are recommended.
    - name: person_role
      type: list
      required: true
      description: Type of contribution of the person to the investigation
      items: string
    - name: person_affiliation
      type: list
      required: true
      description: The institution the person belongs to. Institution should be listed in the institution section.
      items: string
  Institution:
    description: Information about the institution
    fields:
    - name: organisation
      type: list
      required: true
      description: Name and address of the institution(s). At multiple list the main institution first.
      items: string
    - name: type
      type: list
      required: true
      description: ''
      items: string
      constraints:
        enum:
        - University
        - Company
        - Other
