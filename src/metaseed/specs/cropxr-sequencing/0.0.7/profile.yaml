    - name: runs
      type: list
      items: Run
      required: false
      description: Sequencing runs for this experiment
  Run:
    description: A run contains a group of reads generated for a particular experiment
    fields:
    - name: run_id
      type: string
      required: false
      description: Unique identifier for each run, from ENA, to be filled in by bioinformatician when the data are uploaded
        to ENA
    - name: internal_experiment_id
      type: string
      required: false
      description: Used to link run to experiment.
    - name: data_file_link
      type: string
      required: false
      description: The name or relative pathname of a run data file, to be filled in by bioinformatician who processes the
        data
    - name: data_file_description
      type: string
      required: true
      description: Description of the format of the data file. May be a standard file format name, or a description of organization
        of the data in a tabular file.
    - name: data_file_format
      type: string
      required: false
      description: The run data file model.
      constraints:
        enum:
        - sra
        - srf
        - sff
        - fastq
        - fasta
        - tab
        - 454_native
        - 454_native_seq
        - 454_native_qual
        - Helicos_native
        - Illumina_native
        - Illumina_native_seq
        - Illumina_native_prb
        - Illumina_native_int
        - Illumina_native_qseq
        - Illumina_native_scarf
        - SOLiD_native
        - SOLiD_native_csfasta
        - SOLiD_native_qual
        - PacBio_HDF5
        - bam
        - cram
        - CompleteGenomics_native
        - OxfordNanopore_native
    - name: md5_checksum
      type: string
      required: true
      description: md5 checksum string per file; to be filled in by the bioinformatician
  Sample:
    description: A Sample defines an isolate of sequenceable material upon which sequencing experiments can be based. The
      Sample object may be a surrogate for taxonomy accession or an anonymized individual identifier. Or, it may fully specify
      provenance and isolation method of the starting material.
    fields:
    - name: lab_internal_sample_id
      type: integer
      required: false
      description: string of alphanumeric characters unique in the experiment and convenient to use in the lab
    - name: sample_title
      type: string
      required: true
      description: Short text that can be used to call out sample records in search results or in displays.
    - name: collection_date
      type: date
      required: true
      description: The date the sample was collected with the intention of sequencing.
    - name: plant_structure_ontology
      type: string
      required: true
      description: Ontology term for plant structure. Find at https://browser.planteome.org/amigo/term/PO:0025007, http://purl.obolibrary.org/obo/PO_0025131
    - name: plant_structure
      type: string
      required: true
      description: Name of plant structure that the sample was obtained from. Description of the plant_structure_ontology.
    - name: taxon_id
      type: string
      required: true
      description: 'Ncbi taxonomy identifier. this is appropriate for individual organisms and some environmental samples.
        Find at https://www.ncbi.nlm.nih.gov/Taxonomy/Browser/wwwtax.cgi '
    - name: species_name
      type: string
      required: true
      description: Scientific Latin name of the species, excluding the names of people who gave the name to the species.
    - name: plant_developmental_stage_text
      type: string
      required: true
      description: Description of the developmental stage
    - name: plant_developmental_stage_ontology
      type: string
      required: true
      description: Ontology term that describes developmental stage
    - name: country
